# VisionLoop — local development stack.
# Phase 1 boots: postgres, redis, rabbitmq, minio (R2 stand-in), api, web, ai-service.
# Observability (otel-collector, jaeger, prometheus, grafana) wired in Phase 6.

name: visionloop

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: visionloop
      POSTGRES_USER: visionloop
      POSTGRES_PASSWORD: visionloop
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visionloop -d visionloop"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8.0-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: visionloop
      RABBITMQ_DEFAULT_PASS: visionloop
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/visionloop-dev || true &&
      mc anonymous set download local/visionloop-dev || true
      "

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./apps/api/.env
    environment:
      POSTGRES_URL: postgres://visionloop:visionloop@postgres:5432/visionloop?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://visionloop:visionloop@rabbitmq:5672/
      S3_ENDPOINT: http://minio:9000
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./apps/web/.env.local
    environment:
      DATABASE_URL: postgres://visionloop:visionloop@postgres:5432/visionloop?sslmode=disable
    ports: ["3000:3000"]
    depends_on:
      - api

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./apps/ai-service/.env
    environment:
      RABBITMQ_URL: amqp://visionloop:visionloop@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/1
    ports: ["8000:8000"]
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Phase 2: separate process that consumes jobs.pending and posts
  # callbacks. Same image as ai-service; different entrypoint.
  ai-worker:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./apps/ai-service/.env
    environment:
      RABBITMQ_URL: amqp://visionloop:visionloop@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/1
      API_CALLBACK_URL: http://api:8080/internal/jobs/callback
    command: ["python", "-m", "app.workers"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
