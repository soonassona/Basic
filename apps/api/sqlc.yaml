version: "2"
sql:
  - engine: postgresql
    queries: internal/db/queries
    schema: internal/db/migrations
    gen:
      go:
        package: sqlc
        out: internal/db/sqlc
        sql_package: pgx/v5
        emit_interface: true
        emit_pointers_for_null_types: true
        emit_json_tags: false
        emit_prepared_queries: false
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
