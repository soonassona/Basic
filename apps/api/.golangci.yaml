run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - revive
    - unconvert
    - whitespace

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: exported
        arguments: ["disableStutteringCheck"]

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gocritic]
