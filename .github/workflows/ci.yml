name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  api:
    name: api / lint-typecheck-test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: visionloop
          POSTGRES_USER: visionloop
          POSTGRES_PASSWORD: visionloop
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U visionloop -d visionloop"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Bumped from 1.24 → 1.25 in Phase 2 (queue topology) — testcontainers-go
          # transitive deps require 1.25. See ADR-0004 appendix.
          go-version: "1.25"
          cache-dependency-path: apps/api/go.sum
      - name: go vet
        run: go vet ./...
      - name: install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.27.0
      - name: regenerate sqlc and verify clean
        run: |
          sqlc generate
          if ! git diff --exit-code -- internal/db/sqlc; then
            echo "sqlc-generated code is out of date. Run \`make sqlc\` and commit." >&2
            exit 1
          fi
      - name: install migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1
      - name: migrate up
        env:
          POSTGRES_URL: postgres://visionloop:visionloop@localhost:5432/visionloop?sslmode=disable
        run: make migrate-up
      - name: go test
        run: go test -race -count=1 -timeout=180s -coverprofile=coverage.out ./...
      - name: integration tests (testcontainers)
        run: make test-integration
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  pact-provider:
    name: api / pact provider verification
    needs: [api, web]
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/api/go.sum
      - name: download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pacts
          path: apps/web/pacts/
      - name: pact provider verification
        # The Makefile target downloads libpact_ffi.so to /tmp/pact-libs
        # on first run, then replays each interaction in the consumer
        # pact against the production router with Postgres + RabbitMQ
        # booted via testcontainers. Build tag `pact` keeps it isolated
        # from the regular integration suite (different libc dep).
        run: make test-pact-provider

  api-image:
    name: api / docker-build
    needs: api
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          load: true
          tags: visionloop/api:ci
      - name: Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: visionloop/api:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}

  web:
    name: web / lint-typecheck-test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - name: install
        run: bun install --frozen-lockfile
        working-directory: .
      - name: lint
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: vitest
        run: bun run test
      - name: pact consumer
        # Generates apps/web/pacts/visionloop-web-visionloop-api.json.
        # The pact-provider job downloads this artifact and verifies it
        # against the real Go router.
        run: bun run test:pact:consumer
      - name: upload pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: apps/web/pacts/
          retention-days: 14
      - name: bun audit
        run: bun audit --prod || echo "bun audit returned warnings"

  web-image:
    name: web / docker-build
    needs: web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          load: true
          tags: visionloop/web:ci
      - name: Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: visionloop/web:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}

  ai-service:
    name: ai-service / lint-typecheck-test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/ai-service/pyproject.toml
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy app
      - name: pytest
        run: pytest -q --cov=app --cov-report=xml --cov-report=term
      - name: pip-audit
        run: pip-audit || echo "pip-audit returned warnings"

  ai-image:
    name: ai-service / docker-build
    needs: ai-service
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          push: false
          load: true
          tags: visionloop/ai-service:ci
      - name: Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: visionloop/ai-service:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ai-service:latest
            ghcr.io/${{ github.repository }}/ai-service:${{ github.sha }}
